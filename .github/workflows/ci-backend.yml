name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  ci:
    name: Lint & tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deskclock
          POSTGRES_PASSWORD: deskclock
          POSTGRES_DB: deskclock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Run migrations
        run: npm run migrate:test
        env:
          DATABASE_URL_TEST: postgres://deskclock:deskclock@localhost:5432/deskclock_test

      - name: Run tests
        run: npm run test:run
        env:
          DATABASE_URL_TEST: postgres://deskclock:deskclock@localhost:5432/deskclock_test
          JWT_SECRET: ci-secret-pour-les-tests-uniquement
          APPLE_CLIENT_ID: com.test.deskclock
          NODE_ENV: test

  backend-ok:
    name: Backend OK
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()
    steps:
      - name: Check ci result
        run: |
          if [[ "${{ needs.ci.result }}" == "failure" || "${{ needs.ci.result }}" == "cancelled" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
          echo "CI passed or was skipped — OK"